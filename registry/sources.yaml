sources:
  - id: obsidian-skills
    type: github
    repo: arch3rPro/obsidian-skills
    upstreamRepo: kepano/obsidian-skills
    license: MIT
    syncPolicy: adapted
    notes: "Existing Obsidian skills retained as knowledge-management tools."

  - id: defuddle-cli
    type: github
    repo: kepano/defuddle-cli
    license: MIT
    syncPolicy: adapted
    notes: "Referenced by the defuddle skill for clean web content extraction."

  - id: searxng
    type: github
    repo: searxng/searxng
    documentation: https://docs.searxng.org/dev/search_api.html
    license: AGPL-3.0
    syncPolicy: reference-only
    notes: "Official Search API used to design the local SearXNG search skill."

  - id: hermes-agent-searxng-search
    type: github
    repo: NousResearch/hermes-agent
    path: optional-skills/research/searxng-search/SKILL.md
    license: MIT
    syncPolicy: reference-only
    notes: "Referenced for availability probing, timeout discipline, result fields, and search-then-extract workflow."

  - id: openclaw-searxng-search
    type: documentation
    url: https://docs.openclaw.ai/tools/searxng-search
    license: unknown
    syncPolicy: reference-only
    notes: "Referenced for provider configuration, SEARXNG_BASE_URL, JSON format requirements, network guard, and category fallback behavior."

  - id: openclaw-web-fetch
    type: documentation
    url: https://docs.openclaw.ai/zh-CN/tools/web-fetch
    license: unknown
    syncPolicy: reference-only
    notes: "Referenced for the web_search versus web_fetch capability split, URL-first fetch semantics, extraction modes, timeout, fallback, caching, and network-guard concerns."

  - id: arxiv-api
    type: documentation
    url: https://arxiv.org/
    documentation: https://info.arxiv.org/help/api/user-manual.html
    license: arXiv Terms of Use
    syncPolicy: adapted
    notes: "Official arXiv API used for arxiv-search paper discovery, fielded queries, Atom parsing, and API pacing."

  - id: hermes-agent-arxiv
    type: documentation
    url: https://hermes-agent.nousresearch.com/docs/user-guide/skills/bundled/research/research-arxiv
    license: MIT
    syncPolicy: reference-only
    notes: "Referenced for arXiv skill scope, query field examples, no-key usage, and search-first paper workflow."

  - id: tavily-agent-skills
    type: github
    repo: tavily-ai/skills
    documentation: https://docs.tavily.com/documentation/agent-skills
    license: MIT
    syncPolicy: adapted
    notes: "Official Tavily Agent Skills used as upstream structure for search, extract, map, crawl, and research skills while keeping ArkSpace provider-manager as the runtime configuration layer."

  - id: openclaw-tavily
    type: github
    repo: openclaw/openclaw
    path: extensions/tavily
    documentation: https://docs.openclaw.ai/tools/tavily
    license: unknown
    syncPolicy: reference-only
    notes: "Referenced for Tavily as a generic web_search provider plus explicit search/extract tools, API-key configuration, base URL, and tool capability boundaries."

  - id: exa
    type: documentation
    url: https://exa.ai/docs/reference/search-api-guide
    documentation: https://exa.ai/docs/reference/search
    license: unknown
    syncPolicy: adapted
    notes: "Official Exa API documentation used for ArkSpace Exa search, contents, and answer provider helpers."

  - id: openclaw-exa-search
    type: documentation
    url: https://docs.openclaw.ai/tools/exa-search
    license: unknown
    syncPolicy: reference-only
    notes: "Referenced for Exa as a web_search provider with neural, keyword, hybrid search modes and API-key configuration."

  - id: exa-context
    type: documentation
    url: https://exa.ai/docs/reference/context
    documentation: https://exa.ai/docs/reference/context
    license: unknown
    syncPolicy: adapted
    notes: "Official Exa Code Context API used for ArkSpace exa-context."

  - id: exa-similar
    type: documentation
    url: https://exa.ai/docs/reference/find-similar-links
    documentation: https://exa.ai/docs/reference/find-similar-links
    license: unknown
    syncPolicy: adapted
    notes: "Official Exa Find Similar API used for ArkSpace exa-similar related page discovery."

  - id: firecrawl-cli
    type: github
    repo: firecrawl/cli
    documentation: https://docs.firecrawl.dev/quickstarts/openclaw
    license: MIT
    syncPolicy: adapted
    notes: "Official Firecrawl CLI and agent skills used as upstream structure for ArkSpace Firecrawl search, scrape, map, crawl, agent, browser, interact, and monitor skills while keeping ArkSpace provider-manager as the runtime configuration layer."

  - id: openclaw-firecrawl
    type: documentation
    url: https://docs.openclaw.ai/tools/firecrawl
    license: unknown
    syncPolicy: reference-only
    notes: "Referenced for Firecrawl as web_search and web_fetch provider, explicit search/scrape tools, base URL configuration, and target-safety concerns."

  - id: hermes-exa-provider
    type: github
    repo: NousResearch/hermes-agent
    path: plugins/web/exa/provider.py
    documentation: https://github.com/NousResearch/hermes-agent/blob/main/website/docs/user-guide/features/web-search.md
    license: MIT
    syncPolicy: reference-only
    notes: "Referenced for Hermes Exa search plus extract provider behavior and per-capability web provider split."

  - id: superpowers
    type: github
    repo: obra/superpowers
    license: MIT
    syncPolicy: reference-only
    localPath: reference/superpowers
    notes: "Reference for multi-platform plugin structure and agent workflow skills."
