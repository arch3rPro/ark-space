defaultSearchPolicy: role-first-provider-second

providers:
  - id: arxiv
    skill: arxiv-search
    status: active
    capability: web_search
    providerType: academic-preprint-api
    priority: 190
    privacy: public-api
    configRequired: false
    providerConfigCommand: none
    checkCommand: python3 <installed-arkspace-path>/scripts/arkspace.py provider check arxiv --capability web_search
    missingConfigBehavior: none
    setupHint: "No API key or setup is required. Query the official arXiv API through arxiv-search."
    authModes: none
    rotationSupported: false
    outputFields: id,title,authors,published,updated,summary,primary_category,categories,abs_url,pdf_url,doi,journal_ref,comment
    roles: docs/web-researcher,product/competitive-analyst,code/code-engineer,code/code-reviewer
    notes: "Use for academic preprint discovery, arXiv IDs, author/title/category search, and literature candidate lists."

  - id: searxng
    skill: searxng-search
    status: active
    capability: web_search
    providerType: metasearch
    priority: 200
    privacy: self-host-required
    configEnv: SEARXNG_URL,SEARXNG_BASE_URL
    configRequired: true
    recommendedEnv: SEARXNG_URL
    compatibleEnv: SEARXNG_BASE_URL
    providerConfigCommand: python3 <installed-arkspace-path>/scripts/arkspace.py provider configure searxng --base-url <url>
    checkCommand: python3 <installed-arkspace-path>/scripts/arkspace.py provider check searxng
    missingConfigBehavior: guide-user-through-provider-manager-configuration
    setupHint: "Run python3 <installed-arkspace-path>/scripts/arkspace.py provider configure searxng --base-url <url>, set SEARXNG_URL, or pass --base-url for one-off use."
    authModes: none
    rotationSupported: false
    outputFields: title,url,content,engine,parsed_url,img_src,thumbnail,author,publishedDate,score
    roles: docs/web-researcher,product/competitive-analyst,orchestrator
    notes: "Use for SearXNG-specific requests or self-hosted/private search."

  - id: exa
    skill: exa-search
    status: active
    capability: web_search
    providerType: semantic-search-api
    priority: 175
    privacy: api-backed
    configEnv: EXA_API_KEY
    configRequired: true
    recommendedEnv: EXA_API_KEY_1
    providerConfigCommand: python3 <installed-arkspace-path>/scripts/arkspace.py provider setup exa --wizard
    keyConfigCommand: python3 <installed-arkspace-path>/scripts/arkspace.py provider setup exa --wizard --key-count 2
    checkCommand: python3 <installed-arkspace-path>/scripts/arkspace.py provider check exa --capability web_search
    missingConfigBehavior: guide-user-through-provider-manager-configuration
    setupHint: "Run python3 <installed-arkspace-path>/scripts/arkspace.py provider setup exa --wizard. Use --key-count for multiple API keys."
    authModes: api_key
    rotationSupported: true
    outputFields: title,url,snippet,score,published,author,highlights,highlight_scores,summary,entities,extras,context,structured,resolved_search_type,cost_dollars,request_id
    roles: docs/web-researcher,product/competitive-analyst,code/code-engineer,code/code-reviewer,orchestrator
    notes: "Use for semantic/neural search, coding docs, repositories, technical research, company/people/news discovery, domain/date filtered discovery, content-bearing search results, deep/deep-reasoning search modes, and structured output."

  - id: tavily
    skill: tavily-search
    status: active
    capability: web_search
    providerType: search-api
    priority: 150
    privacy: api-backed
    configEnv: TAVILY_API_KEY
    configRequired: true
    recommendedEnv: TAVILY_API_KEY_1
    providerConfigCommand: python3 <installed-arkspace-path>/scripts/arkspace.py provider setup tavily --wizard
    keyConfigCommand: python3 <installed-arkspace-path>/scripts/arkspace.py provider setup tavily --wizard --key-count 2
    checkCommand: python3 <installed-arkspace-path>/scripts/arkspace.py provider check tavily --capability web_search
    missingConfigBehavior: guide-user-through-provider-manager-configuration
    setupHint: "Run python3 <installed-arkspace-path>/scripts/arkspace.py provider setup tavily --wizard. Use --key-count for multiple API keys."
    authModes: api_key
    rotationSupported: true
    outputFields: title,url,snippet,score,published,answer,usage,request_id
    roles: docs/web-researcher,product/competitive-analyst,orchestrator
    notes: "Use for API-backed public web search, Tavily-specific depth/topic/domain controls, current news, finance, and LLM-optimized snippets."

  - id: firecrawl
    skill: firecrawl-search
    status: active
    capability: web_search
    providerType: cli-backed-search-scrape
    priority: 140
    privacy: api-backed-cli
    configEnv: FIRECRAWL_API_KEY,FIRECRAWL_API_URL
    configRequired: true
    recommendedEnv: FIRECRAWL_API_KEY_1
    providerConfigCommand: python3 <installed-arkspace-path>/scripts/arkspace.py provider setup firecrawl --wizard
    keyConfigCommand: python3 <installed-arkspace-path>/scripts/arkspace.py provider setup firecrawl --wizard --key-count 2
    checkCommand: python3 <installed-arkspace-path>/scripts/arkspace.py provider check firecrawl --capability web_search
    missingConfigBehavior: guide-user-through-provider-manager-configuration
    setupHint: "Run python3 <installed-arkspace-path>/scripts/arkspace.py provider setup firecrawl --wizard. Use --key-count for multiple API keys. Install Firecrawl CLI or make npx available."
    authModes: api_key
    rotationSupported: true
    outputFields: id,data,web,images,news,title,url,description,markdown,creditsUsed,warning
    roles: docs/web-researcher,product/competitive-analyst,orchestrator
    notes: "Use when search should optionally scrape full page content, when JS-heavy sources are likely, or when the user explicitly asks for Firecrawl."
