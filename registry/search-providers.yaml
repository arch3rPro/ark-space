defaultSearchPolicy: role-first-provider-second

providers:
  - id: searxng
    skill: searxng-search
    status: active
    capability: web_search
    providerType: metasearch
    priority: 200
    privacy: self-host-required
    configEnv: SEARXNG_URL,SEARXNG_BASE_URL
    configRequired: true
    recommendedEnv: SEARXNG_URL
    compatibleEnv: SEARXNG_BASE_URL
    providerConfigCommand: python3 scripts/arkspace_provider.py configure searxng --base-url <url>
    checkCommand: python3 skills/searxng-search/scripts/searxng_search.py --check
    missingConfigBehavior: guide-user-through-provider-manager-configuration
    setupHint: "Run python3 scripts/arkspace_provider.py configure searxng --base-url <url>, set SEARXNG_URL, or pass --base-url for one-off use."
    authModes: none
    rotationSupported: false
    outputFields: title,url,content,engine,parsed_url,img_src,thumbnail,author,publishedDate,score
    roles: docs/knowledge-manager,product/competitive-analyst,orchestrator
    notes: "Use for SearXNG-specific requests or self-hosted/private search."
